<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日語特訓任務</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif;
            background-color: #fdf4ff; /* 淺粉色背景 */
            color: #334155;
            user-select: none;
        }

        /* 隱藏捲軸但可滾動 */
        ::-webkit-scrollbar {
            display: none;
        }

        ruby {
            ruby-align: center;
        }
        
        rt {
            font-size: 0.6em;
            color: #8b5cf6; /* 紫色拼音，在淺色背景上更清楚 */
            font-weight: bold;
        }

        .sentence-box {
            transition: all 0.3s ease;
        }
        
        .sentence-box:active {
            transform: scale(0.98);
        }

        .chinese-translation {
            display: none;
            animation: fadeIn 0.3s ease forwards;
        }

        .show-chinese {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .soft-shadow {
            box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.15), 0 8px 10px -6px rgba(236, 72, 153, 0.1);
        }

        .bg-pattern {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: #f8fafc;
        }
        
        .choice-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex justify-center items-center bg-pattern">

    <!-- 遊戲容器 (改為寬版網頁式) -->

                    1. 學生看不懂平假名，請引導她先按「🔊」聽發音。<br>
                    2. 點擊左側日文句子後，右側會解鎖「N3文法解析」與「對方回應的性別差異」。<br>
                    3. 可引導學生觀察男生與女生在接話時的語氣不同。
                </p>
            </div>
            <button onclick="startGame()" class="bg-gradient-to-r from-pink-500 to-violet-500 text-white font-bold py-4 px-20 rounded-full text-xl tracking-widest shadow-lg shadow-pink-200 hover:scale-105 transition-transform">

        </div>

                </button>

                        <div class="font-bold text-2xl text-purple-600 mb-2">異世界轉生</div>

        let currentLevel = 0;
        let currentDialogueIndex = 0;
        let synth = window.speechSynthesis;

        function hideAllScreens() {
            document.getElementById('screen-title').classList.add('hidden');
            document.getElementById('screen-map').classList.add('hidden');
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-result').classList.add('hidden');
        }

        function startGame() {
            hideAllScreens();
            document.getElementById('screen-map').classList.remove('hidden');
        }

        function showMap() {
            if(synth.speaking) synth.cancel();
            hideAllScreens();
            document.getElementById('screen-map').classList.remove('hidden');
        }

        function loadLevel(levelIndex) {
            currentLevel = levelIndex;
            currentDialogueIndex = 0;
            const levelData = courseData[currentLevel];
            
            document.getElementById('level-title').innerText = levelData.title;
            document.getElementById('scene-image').innerText = levelData.icon;
            
            hideAllScreens();
            document.getElementById('screen-game').classList.remove('hidden');
            
            showDialogue();
        }

        function showDialogue() {
            // 重置：隱藏中文翻譯與右側教學面板
            document.getElementById('ch-translation').classList.remove('show-chinese');
            document.getElementById('right-panel-overlay').classList.remove('hidden');
            
            const rightContent = document.getElementById('right-panel-content');
            rightContent.classList.add('hidden');
            rightContent.classList.remove('flex');
            
            const levelData = courseData[currentLevel];
            const dialogue = levelData.dialogues[currentDialogueIndex];
            
            document.getElementById('progress-text').innerText = `${currentDialogueIndex + 1}/${levelData.dialogues.length}`;
            
            // 左側句子與中文
            document.getElementById('jp-text').innerHTML = dialogue.jp;
            document.getElementById('ch-text').innerText = dialogue.ch;
            
            // 右側文法解析
            document.getElementById('grammar-note').innerText = dialogue.grammar;
            document.getElementById('grammar-connection').innerText = dialogue.connection;
            
            // 右側例句渲染
            const examplesContainer = document.getElementById('grammar-examples');
            examplesContainer.innerHTML = '';
            dialogue.examples.forEach(ex => {
                examplesContainer.innerHTML += `
                    <div class="bg-white/70 p-3 rounded-lg border border-violet-100 mb-1">
                        <div class="font-bold text-slate-700 text-sm mb-1">${ex.jp}</div>
                        <div class="text-slate-500 text-sm">${ex.ch}</div>
                    </div>
                `;
            });
            
            // 右側性別回應差異渲染
            const responsesContainer = document.getElementById('next-responses');
            responsesContainer.innerHTML = '';
            
            const genders = [
                { key: 'female', label: '🌸 女生接話', style: 'bg-pink-50 border-pink-200 text-pink-800 hover:bg-pink-100', pitch: 1.2 },
                { key: 'male', label: '👦 男生接話', style: 'bg-blue-50 border-blue-200 text-blue-800 hover:bg-blue-100', pitch: 0.8 }
            ];

            genders.forEach(g => {
                const res = dialogue.nextResponses[g.key];
                responsesContainer.innerHTML += `
                    <div class="border-2 rounded-xl p-3 flex items-center justify-between transition-colors ${g.style}">
                        <div class="flex-1 pr-3">
                            <div class="text-xs font-bold opacity-70 mb-1">${g.label}</div>
                            <div class="text-base font-bold mb-1">${res.jp}</div>
                            <div class="text-sm opacity-80">${res.ch}</div>
                        </div>
                        <button onclick="playResponseAudio('${res.plainJp}', ${g.pitch})" class="bg-white rounded-full w-12 h-12 flex items-center justify-center shadow-sm hover:scale-110 transition-transform shrink-0">
                            🔊
                        </button>
                    </div>
                `;
            });
        }

        // 點擊左側對話，顯示中文與右側教學面板
        function toggleTranslation() {
            document.getElementById('ch-translation').classList.add('show-chinese');
            
            document.getElementById('right-panel-overlay').classList.add('hidden');
            
            const rightContent = document.getElementById('right-panel-content');
            rightContent.classList.remove('hidden');
            rightContent.classList.add('flex');
        }

        function playMainAudio() {
            if (!synth) return;
            if (synth.speaking) synth.cancel();

            const dialogue = courseData[currentLevel].dialogues[currentDialogueIndex];
            const utterThis = new SpeechSynthesisUtterance(dialogue.plainJp);
            utterThis.lang = 'ja-JP';
            utterThis.rate = 0.85; 
            utterThis.pitch = 1.1; 
            synth.speak(utterThis);
        }

        function playResponseAudio(text, pitchValue) {
            if (!synth) return;
            if (synth.speaking) synth.cancel();

            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = 'ja-JP';
            utterThis.rate = 0.85; 
            utterThis.pitch = pitchValue; 
            synth.speak(utterThis);
        }

        function nextDialogue() {
            if(synth.speaking) synth.cancel();

            const levelData = courseData[currentLevel];
            currentDialogueIndex++;
            
            if (currentDialogueIndex >= levelData.dialogues.length) {
                hideAllScreens();
                document.getElementById('screen-result').classList.remove('hidden');
            } else {
                showDialogue();
            }
        }
    </script>
